<body>
<div class="wrap">
  <h1>🎤 60 秒即兴</h1>
  <div class="sub">抽题 → 张口说满 60 秒 · 练临场表达（也练英语）</div>

  <div class="seg" id="langSeg">
    <button data-l="both" class="on">双语</button>
    <button data-l="en">English</button>
    <button data-l="zh">中文</button>
  </div>

  <div style="text-align:center;margin:-8px 0 18px">
    <label style="color:var(--dim);font-size:12px;">🗣️ 朗读嗓音
      <select id="voiceSel" style="font:inherit;font-size:12px;background:#15211f;color:var(--ink);border:1px solid var(--stroke);border-radius:8px;padding:6px 8px;max-width:220px;margin-left:4px"></select>
    </label>
  </div>

  <div class="card" style="padding:16px 20px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:19px;font-weight:800">🔥 连续 <span id="streakN">0</span> 天</span>
      <span style="color:var(--dim);font-size:13px">累计 <span id="totalDays">0</span> 天</span>
    </div>
    <div id="cal" style="display:flex;gap:5px;margin-top:12px"></div>
    <div id="todayDone" style="text-align:center;font-size:13px;margin-top:10px;color:var(--dim)"></div>
  </div>

  <div class="card">
    <div id="topic"><div class="topic-empty">点下面「🎲 抽题」开始</div></div>

    <div class="timer">
      <div id="count">60</div>
      <div id="phase"></div>
      <div class="bar"><i id="barFill"></i></div>
    </div>

    <button class="big" id="drawBtn">🎲 抽题</button>
    <button class="big amber" id="goBtn" disabled>▶︎ 开始说 60 秒</button>

    <div class="opts">
      <label><input type="checkbox" id="prepChk"> 先给我 15 秒想一想</label>
    </div>

    <button class="big" id="refBtn" disabled style="background:#1c2a27;color:var(--ink);border:1px solid var(--stroke)">📝 看参考范本</button>
    <div id="ref" style="display:none"></div>

    <div id="stat"></div>
  </div>

  <div class="tip">
    <h3>不知道怎么说？用 PREP 四步</h3>
    <p><span class="k">P 观点</span> 先一句话给结论（我觉得…）</p>
    <p><span class="k">R 理由</span> 因为…（1-2 个原因）</p>
    <p><span class="k">E 例子</span> 比如…（一个具体例子最有说服力）</p>
    <p><span class="k">P 重申</span> 所以…（再说一遍观点收尾）</p>
  </div>

  <div class="note">说满 60 秒不卡壳就是胜利，内容好不好不重要。每天 3 次，坚持比完美重要。<br>
  💡 iPhone 想要更自然的英音：设置 → 辅助功能 → 朗读内容 → 嗓音 → English，下载一个「增强/Premium」嗓音，再回来在上面选它。</div>
</div>

<script>
let ctx;
function audio(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==='suspended') ctx.resume(); return ctx; }
function beep(freq,dur){ const a=audio(),o=a.createOscillator(),g=a.createGain(); o.frequency.value=freq;
  o.connect(g); g.connect(a.destination); const t=a.currentTime; g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.25,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02); }

// 英文朗读 —— 自动挑设备上最好的母语英音 + 可手动选
let chosenURI = localStorage.getItem('is_voice') || '';
function listEN(){ return (window.speechSynthesis?window.speechSynthesis.getVoices():[]).filter(v=>/^en/i.test(v.lang)); }
function rankVoice(v){ let s=0; const n=(v.name||'').toLowerCase();
  if(/en[-_]us/i.test(v.lang)) s+=3; else if(/en[-_]gb/i.test(v.lang)) s+=2; else s+=1;
  if(/google|samantha|siri|ava|allison|aaron|nicky|daniel|serena|enhanced|premium|natural/.test(n)) s+=6;
  if(!v.localService) s+=2; return s; }
function defaultVoice(){ const es=listEN(); return es.length? es.slice().sort((a,b)=>rankVoice(b)-rankVoice(a))[0] : null; }
function currentVoice(){ const es=listEN(); return es.find(v=>v.voiceURI===chosenURI) || defaultVoice(); }
function populateVoices(){ const sel=document.getElementById('voiceSel'); if(!sel) return;
  const es=listEN().slice().sort((a,b)=>rankVoice(b)-rankVoice(a));
  if(!es.length){ sel.innerHTML='<option>（设备暂无英文语音）</option>'; return; }
  sel.innerHTML=es.map(v=>`<option value="${v.voiceURI}">${v.name} · ${v.lang}</option>`).join('');
  const c=currentVoice(); if(c) sel.value=c.voiceURI; }
if('speechSynthesis' in window){ populateVoices(); window.speechSynthesis.onvoiceschanged=populateVoices;
  const _vs=document.getElementById('voiceSel');
  if(_vs) _vs.addEventListener('change',()=>{ chosenURI=_vs.value; localStorage.setItem('is_voice',chosenURI); }); }
function speakEN(text){
  if(!('speechSynthesis' in window)){ alert('这个浏览器不支持朗读，建议用 Safari/Chrome'); return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.9; u.pitch=1;
  const v=currentVoice(); if(v){ u.voice=v; u.lang=v.lang; } window.speechSynthesis.speak(u);
}
// 逐句跟读（读一句 → 停顿让你复述 → 下一句）
function splitSentences(t){ const m=t.match(/[^.!?]+[.!?]+/g); return m? m.map(s=>s.trim()) : [t]; }
let curSents=[], shadowOn=false, shadowTimer=null;
function stopShadow(){ shadowOn=false; clearTimeout(shadowTimer);
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('#ref .sent').forEach(s=>s.classList.remove('hl'));
  const b=document.getElementById('shadowBtn'); if(b) b.textContent='🎙️ 逐句跟读';
  const ph=document.getElementById('shadowHint'); if(ph) ph.textContent=''; }
function startShadow(){
  if(!('speechSynthesis' in window) || !curSents.length) return;
  shadowOn=true; let i=0;
  const sb=document.getElementById('shadowBtn'); if(sb) sb.textContent='⏸ 停止跟读';
  const hint=document.getElementById('shadowHint');
  (function step(){
    if(!shadowOn) return;
    document.querySelectorAll('#ref .sent').forEach(s=>s.classList.remove('hl'));
    if(i>=curSents.length){ shadowOn=false; if(sb)sb.textContent='🎙️ 逐句跟读'; if(hint)hint.textContent='✅ 跟读完成！再来可重点听不熟的句子'; return; }
    const span=document.getElementById('sent'+i); if(span) span.classList.add('hl');
    if(hint) hint.textContent='🔊 听这句…';
    const u=new SpeechSynthesisUtterance(curSents[i]); u.lang='en-US'; u.rate=0.9; const _v=currentVoice(); if(_v){ u.voice=_v; u.lang=_v.lang; }
    u.onend=()=>{ if(!shadowOn) return; if(hint) hint.textContent='👄 轮到你，跟着读…';
      const words=curSents[i].split(/\s+/).length; const pause=Math.max(1700, words*480);
      shadowTimer=setTimeout(()=>{ i++; step(); }, pause); };
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  })();
}

   sen:"Autumn is the best season. I say so because it's comfortable and beautiful at once. For example, cool air, golden leaves, and no heavy coats yet. So autumn gives you the best of every world.",
   szh:"秋天是最好的季节。因为它同时兼顾舒适和美。比如凉爽的空气、金黄的落叶，又还不用穿厚外套。所以秋天给了你各种好处的综合。"},
  {en:"What's worth spending more money on?", zh:"什么东西值得多花点钱？",
   sen:"It's worth spending more on a good bed and shoes. I believe so because you're always in one or the other. For example, bad shoes ruin a whole trip. So things between you and the ground deserve quality.",
   szh:"床和鞋值得多花钱。因为你不是躺在床上就是穿着鞋。比如一双烂鞋能毁掉整趟旅行。所以那些“你和地面之间”的东西值得好品质。"},
  {en:"Describe your ideal way to relax.", zh:"描述你最理想的放松方式。",
   sen:"My ideal way to relax is a slow walk with music. I like it because it rests my mind without a screen. For example, an evening walk clears all the day's noise. So that's how I truly reset.",
   szh:"我最理想的放松是边听音乐边慢慢散步。我喜欢它，因为不用屏幕就能让大脑休息。比如傍晚散个步能清空一天的噪音。所以那是我真正“重启”的方式。"},
  {en:"Should kids learn to code? Why or why not?", zh:"小孩该学编程吗？为什么？",
   sen:"I think kids should learn some coding. I say that because it teaches logical thinking, not just programming. For example, breaking a problem into steps helps in any subject. So even if they never code for work, the thinking pays off.",
   szh:"我觉得小孩该学一点编程。因为它教的是逻辑思维，不只是写代码。比如把问题拆成步骤，在任何学科都有用。所以就算他们以后不靠编程吃饭，这种思维也会受益终身。"},
  {en:"What's a movie or song that changed how you feel?", zh:"哪部电影/哪首歌改变过你的心情？",
   sen:"A calm piano playlist always changes my mood. It works because slow music slows my racing thoughts. For example, ten minutes of it before bed and I sleep better. So music is my fastest reset button.",
   szh:"一个安静的钢琴歌单总能改变我的心情。它有用，因为缓慢的音乐能让我飞转的思绪慢下来。比如睡前听十分钟我就睡得更好。所以音乐是我最快的“重启键”。"},
  {en:"Talk about something you're grateful for.", zh:"说一件你心怀感激的事。",
   sen:"I'm grateful for being able to learn anything online. I appreciate it because curiosity now has no gatekeeper. For example, I taught myself to build apps for free. So I never take that access for granted.",
   szh:"我感激能在网上学到任何东西。因为如今好奇心不再有门槛。比如我免费自学会了做应用。所以我从不把这种“获取知识的自由”当作理所当然。"},
  {en:"City life or countryside? Why?", zh:"城市生活还是乡村生活？为什么？",
   sen:"I prefer city life. I choose it because of convenience and opportunity. For example, everything I need is a short walk away. So the city fits my fast-moving life, though I'd visit the countryside to recharge.",
   szh:"我更喜欢城市生活。因为方便、机会多。比如我需要的一切走几步就有。所以城市适合我快节奏的生活，不过我会去乡村给自己充电。"},
  {en:"What's a rule you think should be changed?", zh:"有什么规定你觉得该改？",
   sen:"I think rigid nine-to-five hours should change. I say so because people focus best at different times. For example, I do my best work late at night. So judging by results, not hours, would help everyone.",
   szh:"我觉得死板的朝九晚五该改。因为每个人专注的时间不同。比如我深夜的工作效率最高。所以用“成果”而非“工时”来衡量，对所有人都更好。"},
  {en:"Describe how to make your favorite drink.", zh:"讲讲怎么做你最爱的一杯饮料。",
   sen:"My favorite drink is a simple iced latte. I love it because it's quick yet feels like a treat. For example, just espresso, cold milk, and ice in a tall glass. So in two minutes I get a little daily reward.",
   szh:"我最爱的是简单的冰拿铁。我喜欢它，因为又快又有种犒劳自己的感觉。比如就是浓缩咖啡、冷牛奶加冰，倒进高杯里。所以两分钟我就能得到一份每日小奖励。"},
  {en:"If money were no object, what would you do all day?", zh:"如果不愁钱，你整天会做什么？",
   sen:"If money were no object, I'd build and create all day. I'd choose that because making things is what energizes me. For example, I'd design tools and learn new skills nonstop. So even rich, I'd basically keep doing this.",
   szh:"如果不愁钱，我会整天做东西、搞创作。因为创造才是让我有能量的事。比如我会不停地设计工具、学新技能。所以就算有钱了，我基本还是会做现在这些。"},
  {en:"What's the best advice you've ever received?", zh:"你收到过最好的建议是什么？",
   sen:"The best advice I got was 'done is better than perfect.' It helps because perfectionism stops me from finishing. For example, I now ship rough versions and improve later. So that line made me far more productive.",
   szh:"我收到过最好的建议是“完成胜过完美”。它有用，因为完美主义让我无法收尾。比如我现在先发粗糙版本，之后再改进。所以这句话让我的产出大大提高。"},
  {en:"Is it better to be a specialist or a generalist?", zh:"做专才好还是通才好？",
   sen:"I lean toward being a generalist. I say so because combining skills creates rare value. For example, someone who knows design and code can build alone. So in a fast-changing world, range is a strength.",
   szh:"我偏向做通才。因为把多种技能组合起来能创造稀缺价值。比如一个既懂设计又懂代码的人可以独立完成产品。所以在快速变化的世界里，“广度”是一种优势。"},
  {en:"Describe your hometown to someone who's never been.", zh:"向没去过的人描述你的家乡。",
   sen:"My hometown is a mix of old and new. I'd describe it that way because traditions and modern life sit side by side. For example, you'll find old markets next to glass towers. So it feels both rooted and alive.",
   szh:"我的家乡是新旧交融的地方。我会这样描述，因为传统和现代生活并存。比如老市场紧挨着玻璃高楼。所以它既有根，又充满活力。"},
  {en:"What technology could you not live without?", zh:"哪样科技产品你离不开？",
   sen:"I couldn't live without my smartphone. I say so because it's my map, office, and library in one. For example, I work, learn, and navigate all on it. So losing it would feel like losing a limb.",
   szh:"我离不开智能手机。因为它集地图、办公室和图书馆于一身。比如我用它工作、学习、导航。所以丢了它就像少了一只手。"},
  {en:"Talk about a goal you have this year.", zh:"聊一个你今年的目标。",
   sen:"This year my goal is to speak more confidently. I chose it because it limits me more than any technical skill. For example, I freeze up when I should just talk. So I practice short impromptu speeches every day.",
   szh:"我今年的目标是更自信地表达。我选它，因为它比任何技术能力都更限制我。比如本该开口时我却卡住。所以我每天练短短的即兴演讲。"},
  {en:"What makes you laugh?", zh:"什么会让你笑？",
   sen:"Unexpected, clever wordplay makes me laugh most. I like it because smart humor surprises your brain. For example, a good pun catches me off guard every time. So clever jokes beat slapstick for me.",
   szh:"出其不意的巧妙文字游戏最能让我笑。我喜欢它，因为聪明的幽默会给大脑一个惊喜。比如一个好的双关每次都让我猝不及防。所以对我来说，机智的笑话胜过闹剧。"},
  {en:"Should we keep learning after school? Why?", zh:"离开学校后还要不要继续学习？为什么？",
   sen:"We should absolutely keep learning after school. I say so because the world changes faster than any diploma. For example, half of today's tools didn't exist ten years ago. So lifelong learning is no longer optional.",
   szh:"离开学校后绝对该继续学。因为世界变化的速度比任何文凭都快。比如今天一半的工具十年前根本不存在。所以终身学习已经不是选择题。"},
  {en:"Describe a challenge you overcame.", zh:"描述一个你克服过的困难。",
   sen:"I once had to learn a whole new skill under a deadline. It was hard because I started from zero. For example, I broke it into tiny daily steps instead of panicking. So I learned that steady effort beats raw talent.",
   szh:"我曾经要在截止日前学会一项全新技能。难在我是从零开始。比如我没有慌，而是把它拆成每天的小步骤。所以我明白了：稳定的努力胜过天赋。"},
  {en:"What's overrated, and what's underrated?", zh:"什么被高估了，什么被低估了？",
   sen:"I think motivation is overrated and routine is underrated. I say so because feelings fade but habits last. For example, on lazy days my routine still carries me. So build systems, don't wait to feel inspired.",
   szh:"我觉得“动力”被高估了，“惯例”被低估了。因为情绪会消退，习惯会留下。比如懒散的日子里，是我的惯例在带着我走。所以要建立系统，别等灵感来。"},
  {en:"If you taught a class, what would it be about?", zh:"如果你开一门课，会教什么？",
   sen:"I'd teach a class on learning how to learn. I'd choose it because it multiplies every other subject. For example, knowing how memory works changes how you study. So it's the one skill that makes all others easier.",
   szh:"我会开一门“如何学习”的课。因为它能放大其他所有学科的效果。比如懂得记忆的原理会改变你的学法。所以它是那个能让其他一切都变简单的技能。"},
  {en:"Plan the perfect day for a friend visiting your city.", zh:"为来你城市的朋友安排完美的一天。",
   sen:"For a visiting friend, I'd start with a local breakfast. I'd plan it that way because food shows a city's soul. For example, morning market, afternoon park, evening night view. So they'd taste, walk, and remember the city in one day.",
   szh:"招待来访的朋友，我会从当地早餐开始。这样安排，因为食物最能体现一座城市的灵魂。比如上午逛市场、下午去公园、傍晚看夜景。所以一天下来，他们能尝到、走到、也记住这座城。"}
];

let lang='both', running=false, timer=null, left=60, lastIdx=-1, cur=null;
const topicEl=document.getElementById('topic'), countEl=document.getElementById('count'),
      phaseEl=document.getElementById('phase'), bar=document.getElementById('barFill'),
      goBtn=document.getElementById('goBtn'), drawBtn=document.getElementById('drawBtn'), statEl=document.getElementById('stat'),
      refBtn=document.getElementById('refBtn'), refEl=document.getElementById('ref');
let refShown=false;
function renderRef(){
  if(!cur) return;
  stopShadow();
  let h='<div class="tip" style="margin-top:14px"><h3>📝 参考范本 · PREP（一种说法，不是标准答案）</h3>';
  if(lang!=='zh'){
    curSents=splitSentences(cur.sen);
    const spans=curSents.map((s,i)=>`<span class="sent" id="sent${i}">${s} </span>`).join('');
    h+=`<p style="color:var(--ink);font-size:14px">${spans}</p>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="spk" id="spkRef">🔊 整段朗读</button><button class="spk" id="shadowBtn">🎙️ 逐句跟读</button></div>`;
    h+=`<div id="shadowHint" style="color:var(--amber);font-weight:700;font-size:13px;margin-top:8px;min-height:18px"></div>`;
  }
  if(lang!=='en') h+=`<p style="font-size:13.5px;margin-top:10px">${cur.szh}</p>`;
  h+='</div>'; refEl.innerHTML=h;
  const b=document.getElementById('spkRef'); if(b) b.onclick=()=>speakEN(cur.sen);
  const sh=document.getElementById('shadowBtn'); if(sh) sh.onclick=()=>{ shadowOn?stopShadow():startShadow(); };
}
function showRef(on){ refShown=on; refEl.style.display=on?'block':'none'; if(on) renderRef(); else stopShadow();
  refBtn.textContent=on?'📝 收起范本':'📝 看参考范本'; }
refBtn.addEventListener('click',()=>{ if(cur) showRef(!refShown); });

document.querySelectorAll('#langSeg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#langSeg button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  lang=b.dataset.l; if(cur) renderTopic(); if(refShown) renderRef();
}));
function renderTopic(){
  let h='';
  if(lang!=='zh') h+=`<div id="topicEN">${cur.en}</div>`;
  if(lang!=='en') h+=`<div id="topicZH">${cur.zh}</div>`;
  if(lang!=='zh') h+=`<button class="spk small" id="spkTopic">🔊 读题目</button>`;
  topicEl.innerHTML=h;
  const b=document.getElementById('spkTopic'); if(b) b.onclick=()=>speakEN(cur.en);
}
drawBtn.addEventListener('click',()=>{
  let i; do{ i=Math.floor(Math.random()*TOPICS.length); }while(i===lastIdx && TOPICS.length>1);
  lastIdx=i; cur=TOPICS[i]; renderTopic(); goBtn.disabled=false; refBtn.disabled=false; showRef(false); resetTimer();
});
function resetTimer(){ running=false; clearTimeout(timer); left=60; countEl.textContent='60';
  countEl.className=''; phaseEl.textContent=''; bar.style.width='100%'; goBtn.textContent='▶︎ 开始说 60 秒'; }

function startSpeak(){
  stopShadow();
  left=60; running=true; countEl.className=''; phaseEl.textContent='🗣️ 开始说！'; goBtn.textContent='⏸ 停止';
  beep(880,0.12);
  timer=setInterval(()=>{
    left--; countEl.textContent=left; bar.style.width=(left/60*100)+'%';
    if(left<=10 && left>0){ countEl.className='warn'; phaseEl.textContent='最后 10 秒，撑住！'; if(left<=5) beep(660,0.06); }
    if(left<=0){ clearInterval(timer); running=false; countEl.className='over'; countEl.textContent='0';
      phaseEl.textContent='✅ 说满 60 秒，赞！'; beep(880,0.1); setTimeout(()=>beep(1100,0.18),140);
      goBtn.textContent='▶︎ 再说一次'; bumpStat(); showRef(true); }
  },1000);
}
goBtn.addEventListener('click',()=>{
  if(running){ resetTimer(); phaseEl.textContent='已停止'; return; }
  audio();
  if(document.getElementById('prepChk').checked){
    // 15 秒准备
    let p=15; countEl.textContent=p; countEl.className=''; phaseEl.textContent='🤔 想 15 秒（打腹稿）'; goBtn.textContent='⏸ 跳过准备';
    running=true;
    timer=setInterval(()=>{ p--; countEl.textContent=p; if(p<=0){ clearInterval(timer); startSpeak(); } },1000);
  } else startSpeak();
});

// 计数（今天 + 累计）
function todayKey(){ const d=new Date(); return 'is_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function bumpStat(){
  const tk=todayKey(); const today=(+localStorage.getItem(tk)||0)+1; localStorage.setItem(tk,today);
  const total=(+localStorage.getItem('is_total')||0)+1; localStorage.setItem('is_total',total);
  showStat(today,total);
  recordToday(); renderStreak();
}
function showStat(t,total){ statEl.textContent=`今天第 ${t} 次 · 累计 ${total} 次 ${t>=3?'🎉 达标！':''}`; }

// 每日完成记录（打卡 / 连续天数 / 日历）
function dstr(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function getDays(){ try{ return new Set(JSON.parse(localStorage.getItem('is_days')||'[]')); }catch(e){ return new Set(); } }
function recordToday(){ const arr=JSON.parse(localStorage.getItem('is_days')||'[]'); const t=dstr(new Date());
  if(!arr.includes(t)){ arr.push(t); localStorage.setItem('is_days',JSON.stringify(arr)); } }
function streak(){ const s=getDays(); const d=new Date();
  if(!s.has(dstr(d))) d.setDate(d.getDate()-1); // 今天没练，从昨天起算连续
  let n=0; while(s.has(dstr(d))){ n++; d.setDate(d.getDate()-1); } return n; }
function renderStreak(){
  const s=getDays(), today=dstr(new Date());
  document.getElementById('streakN').textContent=streak();
  document.getElementById('totalDays').textContent=s.size;
  const arr=[]; for(let i=13;i>=0;i--){ const x=new Date(); x.setDate(x.getDate()-i); arr.push(x); }
  document.getElementById('cal').innerHTML=arr.map(x=>{ const ds=dstr(x);
    return `<span class="day ${s.has(ds)?'done':''} ${ds===today?'today':''}" title="${ds}"></span>`; }).join('');
  document.getElementById('todayDone').textContent = s.has(today)
    ? '✅ 今天已完成，明天见！' : '今天还没练 — 抽一题说满 60 秒就记上 ✓';
}

showStat(+localStorage.getItem(todayKey())||0, +localStorage.getItem('is_total')||0);
renderStreak();

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
